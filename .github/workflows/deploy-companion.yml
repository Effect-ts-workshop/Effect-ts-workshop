name: Deploy Companion

on:
  push:
    branches:
      - main
    paths:
      - "doc/companion/**"

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: doc/companion/package-lock.json

      - name: Install dependencies
        working-directory: doc/companion
        run: npm ci

      - name: Build
        working-directory: doc/companion
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: doc/companion/build
