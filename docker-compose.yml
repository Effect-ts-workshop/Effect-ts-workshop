services:
  postgres-dev:
    image: postgres:18.1
    restart: always
    environment:
      POSTGRES_USER: effect-workshop
      POSTGRES_PASSWORD: effect-workshop
      POSTGRES_DB: effect-workshop
    ports:
      - "5433:5432"
    healthcheck:
      test: "pg_isready"
      interval: 3s
      timeout: 5s
      retries: 5
  jaeger:
    container_name: jaeger
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - 16686:16686  # UI
      - 4318:4318    # OTLP HTTP

volumes: {}
